name: ao_dai_gia_bao
description: Quản lý tin nhắn và bình luận Facebook webhook

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  mobile_scanner: ^7.2.0
  image_picker: ^1.1.2
  socket_io_client: ^2.0.3+1
  url_launcher: ^6.3.0
  flutter_local_notifications: ^18.0.0
  connectivity_plus: ^6.1.0
  local_auth: ^3.0.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"